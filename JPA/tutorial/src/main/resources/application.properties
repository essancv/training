# Configuración de la base de datos H2 en memoria
# URL de conexión a la BD. Posibles valores: jdbc:h2:mem:<nombre> para memoria, jdbc:h2:file:<path> para archivo.
# Efecto: Define dónde se almacena la BD (memoria por defecto, no persiste datos al reiniciar).
spring.datasource.url=jdbc:h2:mem:tutorialdb;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false

# Clase del driver JDBC. Posibles valores: org.h2.Driver para H2, otros drivers para otras BD.
# Efecto: Indica qué driver usar para conectar a la BD.
spring.datasource.driverClassName=org.h2.Driver

# Usuario de la BD. Posibles valores: cualquier string (por defecto 'sa' en H2).
# Efecto: Credencial para autenticación en la BD.
spring.datasource.username=sa

# Contraseña de la BD. Posibles valores: cualquier string (vacío por defecto en H2).
# Efecto: Credencial para autenticación en la BD.
spring.datasource.password=

# Estrategia de DDL de Hibernate. Posibles valores: create, create-drop, update, validate, none.
# Efecto: Controla cómo Hibernate maneja el esquema de la BD (create-drop: crea y borra tablas al inicio/fin).
spring.jpa.hibernate.ddl-auto=create-drop

# Mostrar SQL generado. Posibles valores: true, false.
# Efecto: Imprime las consultas SQL en la consola para debugging.
spring.jpa.show-sql=true

# Habilitar consola H2. Posibles valores: true, false.
# Efecto: Activa la interfaz web de H2 para inspeccionar la BD.
spring.h2.console.enabled=true

# Ruta de la consola H2. Posibles valores: cualquier path (ej. /h2-console).
# Efecto: Define la URL para acceder a la consola H2 (http://localhost:8080/h2-console).
spring.h2.console.path=/h2-console

# Profile activo de Spring. Posibles valores: jpa, inmemory (o cualquier profile definido).
# Efecto: Activa el profile correspondiente, cambiando la implementación de repositorios (JPA vs InMemory).
spring.profiles.active=jpa


# kafka configuration
spring.kafka.bootstrap-servers=https://glowing-space-engine-7x49gjrp95gcp57g-9092.app.github.dev:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

topic.user-created=user-created
topic.user-updated=user-updated
topic.user-deleted=user-deleted

# Retries
kafka.publisher.max-retries=3


spring.kafka.producer.transaction-id-prefix=
spring.kafka.transaction-id-prefix=
spring.kafka.producer.properties.enable.idempotence=false