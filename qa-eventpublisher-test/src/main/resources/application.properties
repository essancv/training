server.port=8080

spring.application.name=qa-eventpublisher-test

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=qa-eventpublisher-test
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

event.publisher.retry.max-attempts=3
event.publisher.retry.backoff-ms=1000
event.publisher.dead-letter-topic=qa-dead-letter
event.publisher.logger-name=event-publisher
event.publisher.logger.level=DEBUG

###############################################
# CONFIGURACIÓN DE KAFKA PARA QA
# Objetivo: que los fallos de conexión con Kafka
# se detecten en menos de 2 segundos.
###############################################

# ---------------------------------------------------------
# Timeout máximo para obtener respuesta del broker.
# Si Kafka está caído, el envío fallará en ~2 segundos.
# (Por defecto son 30 segundos → demasiado lento para QA)
# ---------------------------------------------------------
spring.kafka.producer.properties.request.timeout.ms=2000

# ---------------------------------------------------------
# Tiempo máximo total permitido para entregar un mensaje.
# Incluye reintentos internos del producer.
# Si se supera, el envío falla.
# (Por defecto son 120000 ms → 2 minutos)
# ---------------------------------------------------------
spring.kafka.producer.properties.delivery.timeout.ms=2000

# ---------------------------------------------------------
# Tiempo máximo que KafkaProducer puede bloquearse
# esperando metadata del broker.
# Si no hay broker, falla rápido.
# (Por defecto son 60000 ms → 1 minuto)
# ---------------------------------------------------------
spring.kafka.producer.properties.max.block.ms=2000

# ---------------------------------------------------------
# Fuerza la actualización de metadata con más frecuencia.
# Si el broker está caído, se detecta antes.
# (Por defecto son 300000 ms → 5 minutos)
# ---------------------------------------------------------
spring.kafka.producer.properties.metadata.max.age.ms=1000

# ---------------------------------------------------------
# Número de reintentos internos del producer.
# En QA queremos fallos rápidos → 0 reintentos.
# (En producción normalmente se deja >0)
# ---------------------------------------------------------
spring.kafka.producer.retries=0

# ---------------------------------------------------------
# Tiempo de espera entre reintentos internos.
# Como retries=0, no se usa, pero lo dejamos bajo.
# ---------------------------------------------------------
spring.kafka.producer.properties.retry.backoff.ms=100

# ---------------------------------------------------------
# Linger = 0 → envía inmediatamente sin esperar a acumular mensajes.
# Esto reduce latencia y acelera la detección de fallos.
# ---------------------------------------------------------
spring.kafka.producer.properties.linger.ms=0

# ---------------------------------------------------------
# Tamaño del batch. No afecta al timeout, pero evita esperas.
# ---------------------------------------------------------
spring.kafka.producer.properties.batch.size=16384


spring.kafka.admin.enabled=false